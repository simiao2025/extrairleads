name: Deploy Guard (Security, Performance & Purity)

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

jobs:
  audit-and-guard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      # 1. Cybersecurity: Verificar vulnerabilidades
      - name: Npm Audit (Cybersecurity Check)
        run: npm audit --audit-level=high

      # 2. Code Purity: Lint e Formatação com Biome
      - name: Biome Linter
        run: npx @biomejs/biome check src/

      # 3. Code Purity: TypeScript Check
      - name: TypeScript Compiler Check
        run: npx tsc --noEmit

      # 4. Security SAST (Semgrep)
      - name: SAST Security Scan
        uses: semgrep/semgrep-action@v1
        with:
          config: p/nodejs p/owasp-top-ten p/typescript

      # 5. Tests
      - name: Run Tests
        run: npm run test -- --run

      # 6. Performance Build Check
      - name: Next.js Build Check
        run: npm run build
